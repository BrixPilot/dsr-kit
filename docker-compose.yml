services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dsrkit
      POSTGRES_PASSWORD: dsrkit
      POSTGRES_DB: dsrkit
    volumes:
      - dsrkit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dsrkit -d dsrkit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dsrkit_pgdata:
